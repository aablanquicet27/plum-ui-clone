<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4a1fa6" />
  <title>Pocket · Plum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">

    <!-- Status bar -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="island"></div>
      <div class="indicators">
        <!-- cellular -->
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor" aria-hidden="true">
          <rect x="0" y="8" width="3" height="4" rx="1"/>
          <rect x="5" y="5.5" width="3" height="6.5" rx="1"/>
          <rect x="10" y="3" width="3" height="9" rx="1"/>
          <rect x="15" y="0.5" width="3" height="11.5" rx="1"/>
        </svg>
        <!-- wifi -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor" aria-hidden="true">
          <path d="M8.5 2.2c2.7 0 5.2 1 7 2.7l-1.5 1.6A7.7 7.7 0 0 0 8.5 4.3 7.7 7.7 0 0 0 3 6.5L1.5 4.9A10 10 0 0 1 8.5 2.2Zm0 3.6c1.7 0 3.3.65 4.5 1.75l-1.6 1.65A4.1 4.1 0 0 0 8.5 9.1c-1.1 0-2.1.4-2.9 1.1L4 8.55A6.4 6.4 0 0 1 8.5 5.8Zm0 3.7 1.7 1.75c-.95.98-2.45.98-3.4 0L8.5 9.5Z"/>
        </svg>
        <!-- battery -->
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none" aria-hidden="true">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" opacity="0.5"/>
          <rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/>
          <path d="M24 4.2v4.6c1-.35 1-4.25 0-4.6Z" fill="currentColor" opacity="0.5"/>
        </svg>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="content">

      <!-- Header -->
      <header class="header">
        <div class="avatar">
          <img src="https://images.unsplash.com/photo-1542909168-82c3e7fdca5c?q=80&w=200&auto=format&fit=crop" alt="Perfil" />
        </div>
        <button class="icon-btn glass" aria-label="Mensajes">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 9.2 9.2 0 0 1-4-.9L3 20l1.9-5A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z"/>
          </svg>
        </button>
      </header>

      <!-- Balance -->
      <section class="balance">
        <h1 class="balance-amount">€20.55</h1>
        <p class="balance-sub">€0 available</p>
      </section>

      <!-- Pocket card (glass) -->
      <section class="pocket-card">
        <span class="plum-badge lg">
          <svg viewBox="0 0 24 24" class="plum-face" aria-hidden="true">
            <circle cx="8.5" cy="10" r="1.35" fill="#fff"/>
            <circle cx="15" cy="10" r="1.35" fill="#fff"/>
            <path d="M8 14c1 1.6 3 2.4 5 1.3" stroke="#fff" stroke-width="1.7" stroke-linecap="round" fill="none"/>
          </svg>
        </span>
        <div class="pocket-info">
          <p class="pocket-title">Pocket</p>
          <p class="pocket-desc">Easy Access</p>
        </div>
        <p class="pocket-amount">€20.55</p>
      </section>

      <!-- Actions -->
      <section class="actions">
        <button class="action">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </span>
          <span class="action-label">Deposit</span>
        </button>
        <button class="action">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
          </span>
          <span class="action-label">Withdraw</span>
        </button>
        <button class="action">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4.5a2.5 2.5 0 0 0-2.5 2.5A2.5 2.5 0 0 0 7 9.5a2.5 2.5 0 0 0 .5 4.9V16a2.5 2.5 0 0 0 5 0M12 4.5A2.5 2.5 0 0 1 14.5 7 2.5 2.5 0 0 1 17 9.5a2.5 2.5 0 0 1-.5 4.9V16a2.5 2.5 0 0 1-5 0M12 4.5V19"/>
            </svg>
          </span>
          <span class="action-label">Brain</span>
        </button>
        <button class="action">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a9 9 0 1 0 9 9h-9V3Z"/><path d="M13.5 3.2A9 9 0 0 1 20.8 10.5H13.5V3.2Z"/>
            </svg>
          </span>
          <span class="action-label">Splitter</span>
        </button>
      </section>

      <!-- Savings cards -->
      <section class="savings">
        <div class="savings-card">
          <div class="savings-head">
            <span class="plum-badge sm">
              <svg viewBox="0 0 24 24" class="plum-face" aria-hidden="true">
                <circle cx="8.5" cy="10" r="1.35" fill="#fff"/>
                <circle cx="15" cy="10" r="1.35" fill="#fff"/>
                <path d="M8 14c1 1.6 3 2.4 5 1.3" stroke="#fff" stroke-width="1.7" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            <span class="savings-name">Cash ISA</span>
          </div>
          <p class="savings-rate">5.17% AER</p>
          <p class="savings-note">Tax-free savings</p>
        </div>
        <div class="savings-card">
          <div class="savings-head">
            <span class="plum-badge sm">
              <svg viewBox="0 0 24 24" class="plum-face" aria-hidden="true">
                <circle cx="8.5" cy="10" r="1.35" fill="#fff"/>
                <circle cx="15" cy="10" r="1.35" fill="#fff"/>
                <path d="M8 14c1 1.6 3 2.4 5 1.3" stroke="#fff" stroke-width="1.7" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            <span class="savings-name">Plum Interest</span>
          </div>
          <p class="savings-rate">5.11%</p>
          <p class="savings-note">Variable annual rate</p>
        </div>
      </section>

      <!-- Pockets -->
      <section class="pockets">
        <div class="pockets-head">
          <h2 class="pockets-title">Pockets</h2>
          <button class="link">Create</button>
        </div>
        <p class="pockets-sub">Set money aside, earn 4.7% AER</p>

        <div class="pocket-item">
          <span class="round-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 15a4 4 0 0 1 .5-7.97 5.5 5.5 0 0 1 10.6 1.02A3.5 3.5 0 0 1 17.5 15H7Z"/>
              <path d="M8 18.5l-.8 1.5M12 18.5l-.8 1.5M16 18.5l-.8 1.5"/>
            </svg>
          </span>
          <span class="pocket-item-name">Rainy Day Fund</span>
          <div class="pocket-item-right">
            <p class="pocket-item-amount">€0</p>
            <p class="pocket-item-goal">0% of goal</p>
          </div>
        </div>
      </section>

    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item" aria-label="Inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
      </button>
      <button class="nav-item active" aria-label="Ahorros" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12.5" cy="7" r="3.6"/>
          <path d="M12.5 5.3v3.4M10.8 7h3.4"/>
          <path d="M3.5 14c1.7-1.1 3.4-.5 4.9.4.9.55 1.7 1 2.8 1h1.5c.95 0 .95 1.4 0 1.5l-3.1.3"/>
          <path d="M3.5 14v4.3c3.3 1.7 6.6 1.4 9.6.2l5.4-2.2c1.25-.5.6-2.4-.65-2l-3.4.95"/>
        </svg>
      </button>
      <button class="nav-item" aria-label="Actividad">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14 9 9l3 3 6-7"/><path d="M14 5h4v4"/></svg>
      </button>
      <button class="nav-item" aria-label="Cartera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10h18"/><circle cx="16.5" cy="14" r="1.1" fill="currentColor"/></svg>
      </button>
    </nav>

  </main>
</body>
</html>
