<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plum - Savings</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app">
      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="status-icons">
          <svg class="signal" width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0" y="9" width="3" height="3" rx="0.5" fill="white"/>
            <rect x="4.5" y="6" width="3" height="6" rx="0.5" fill="white"/>
            <rect x="9" y="3" width="3" height="9" rx="0.5" fill="white"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white"/>
          </svg>
          <svg class="wifi" width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 10.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="white"/>
            <path d="M4.5 8.5a5 5 0 017 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M2 5.5a9 9 0 0112 0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="battery" width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="white" stroke-opacity="0.35"/>
            <rect x="2" y="2" width="18" height="8" rx="1.5" fill="white"/>
            <path d="M23 4v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/>
          </svg>
        </div>
      </div>

      <!-- Header Section with gradient -->
      <div class="header-section">
        <!-- Top nav -->
        <div class="top-nav">
          <div class="avatar">
            <img src="https://i.pravatar.cc/80?img=11" alt="User avatar">
          </div>
          <button class="chat-btn" aria-label="Chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>

        <!-- Balance -->
        <div class="balance-section">
          <h1 class="balance-amount">€20.55</h1>
          <p class="balance-available">€0 available</p>
        </div>

        <!-- Pocket Card -->
        <div class="pocket-card">
          <div class="pocket-left">
            <div class="pocket-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
                <path d="M8 12c0 0 2-3 4-3s4 3 4 3" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="pocket-info">
              <span class="pocket-name">Pocket</span>
              <span class="pocket-type">Easy Access</span>
            </div>
          </div>
          <span class="pocket-balance">€20.55</span>
        </div>
      </div>

      <!-- Content Section (white bg) -->
      <div class="content-section">
        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="action-btn">
            <div class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B2FD6" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </div>
            <span>Deposit</span>
          </button>
          <button class="action-btn">
            <div class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B2FD6" stroke-width="2.5" stroke-linecap="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </div>
            <span>Withdraw</span>
          </button>
          <button class="action-btn">
            <div class="action-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B2FD6" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 8v4l2 2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="2" fill="#6B2FD6"/>
              </svg>
            </div>
            <span>Brain</span>
          </button>
          <button class="action-btn">
            <div class="action-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B2FD6" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 6v6"/>
                <path d="M8 14l4-2 4 2"/>
              </svg>
            </div>
            <span>Splitter</span>
          </button>
        </div>

        <!-- Product Cards -->
        <div class="product-cards">
          <div class="product-card">
            <div class="product-header">
              <div class="product-icon purple-gradient">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
                  <path d="M8 12c0 0 2-3 4-3s4 3 4 3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="product-name">Cash ISA</span>
            </div>
            <p class="product-rate">5.17% AER</p>
            <p class="product-desc">Tax-free savings</p>
          </div>
          <div class="product-card">
            <div class="product-header">
              <div class="product-icon purple-solid">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
                  <path d="M8 12c0 0 2-3 4-3s4 3 4 3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="product-name">Plum Interest</span>
            </div>
            <p class="product-rate">5.11%</p>
            <p class="product-desc">Variable annual rate</p>
          </div>
        </div>

        <!-- Pockets Section -->
        <div class="pockets-section">
          <div class="pockets-header">
            <div>
              <h2 class="pockets-title">Pockets</h2>
              <p class="pockets-subtitle">Set money aside, earn 4.7% AER</p>
            </div>
            <button class="create-btn">Create</button>
          </div>

          <div class="pocket-item">
            <div class="pocket-item-left">
              <div class="pocket-item-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
              </div>
              <span class="pocket-item-name">Rainy Day Fund</span>
            </div>
            <div class="pocket-item-right">
              <span class="pocket-item-amount">€0</span>
              <span class="pocket-item-goal">0% of goal</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <button class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          </svg>
        </button>
        <button class="nav-item active">
          <div class="nav-active-bg">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M9 12h6M12 9v6"/>
            </svg>
          </div>
        </button>
        <button class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </button>
        <button class="nav-item">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
